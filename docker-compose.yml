services:
  db:
    image: postgres:17-alpine
    container_name: relaycore-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - relaycore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: relaycore-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: relaycore
      RABBITMQ_DEFAULT_PASS: relaycore
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - relaycore_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relaycore-migrator
    env_file:
      - .env.docker
    working_dir: /app
    command: uv run alembic -c /app/alembic.ini upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relaycore-api
    env_file:
      - .env.docker
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relaycore-worker
    env_file:
      - .env.docker
    command: uv run python -m app.workers.node_healthcheck_worker
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  relaycore_postgres_data:
  relaycore_rabbitmq_data:
